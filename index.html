<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super IT</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* LOADER */
.loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f1419;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.logo{width:100px;animation:spin 2s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.loader-text{color:white;margin-top:10px}

/* HERO */
.hero{
    display:none;
    height:100vh;
    background:#0b1d2a;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}
.btn{
    margin-top:10px;
    padding:10px 20px;
    background:#2d6cdf;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* LOGIN */
.login{
    display:none;
    position:fixed;
    width:100%;
    height:100vh;
    background:#000000cc;
    justify-content:center;
    align-items:center;
}
.login-box{
    background:#1f2a32;
    padding:25px;
    border-radius:10px;
    text-align:center;
}
.login-box input{
    width:200px;
    padding:10px;
    margin:8px;
    border:none;
    border-radius:6px;
}
.login-box button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#00e5ff;
}

/* SITE */
#site{
    display:none;
    min-height:100vh;
    background:#0b1d2a;
    color:white;
}

/* NAV */
.nav{
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:bold;
}

/* CARDS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}
.card{
    background:#ffffff10;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
.card i{font-size:28px}
.card a{
    display:block;
    margin-top:8px;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="logo">
    <div class="loader-text">Xush kelibsiz</div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
    <div>
        <h1>Turg'unboyev Sardorbek</h1>
        <p>Forma — nafaqat vakolat, balki mas’uliyat</p>
        <button class="btn" onclick="openLogin()">Kirish</button>
    </div>
</div>

<!-- LOGIN -->
<div class="login" id="login">
    <div class="login-box">
        <h3 style="color:white;">Kirish</h3>
        <input type="text" id="loginInput" placeholder="Login"><br>
        <input type="password" id="passwordInput" placeholder="Parol"><br>
        <button onclick="enterSite()">Kirish</button>
    </div>
</div>

<!-- SITE -->
<div id="site">

<div class="nav">🚀 Super IT</div>

<div class="container">

<div class="card">
<i class='bx bx-brain'></i>
<h3>AI</h3>
<a href="#">Ochish</a>
</div>

<div class="card">
<i class='bx bxl-youtube'></i>
<h3>YouTube</h3>
<a href="https://youtube.com" target="_blank">Ochish</a>
</div>

<div class="card">
<i class='bx bxl-instagram'></i>
<h3>Instagram</h3>
<a href="https://instagram.com" target="_blank">Ochish</a>
</div>

<div class="card">
<i class='bx bxl-telegram'></i>
<h3>Telegram</h3>
<a href="https://t.me" target="_blank">Ochish</a>
</div>

</div>

<button onclick="logout()" style="position:fixed;top:10px;right:10px;padding:8px;border:none;border-radius:6px;">
Chiqish
</button>

</div>

<script>
const loader = document.getElementById("loader");
const hero = document.getElementById("hero");
const login = document.getElementById("login");
const site = document.getElementById("site");
const loginInput = document.getElementById("loginInput");
const passwordInput = document.getElementById("passwordInput");

// 🔥 sahifa ochilganda
window.onload = () => {
    if(localStorage.getItem("login")==="true"){
        loader.style.display="none";
        site.style.display="block";
    } else {
        setTimeout(()=>{
            loader.style.display="none";
            hero.style.display="flex";
        },1500);
    }
};

// login oynasi
function openLogin(){
    login.style.display="flex";
}

// kirish
function enterSite(){
    let u = loginInput.value.trim();
    let p = passwordInput.value.trim();

    if(u==="sardorbek" && p==="0226"){
        localStorage.setItem("login","true");
        login.style.display="none";
        hero.style.display="none";
        site.style.display="block";
    } else {
        alert("Login yoki parol noto‘g‘ri ❌");
    }
}

// logout
function logout(){
    localStorage.removeItem("login");
    location.reload();
}
</script>

</body>
</html>
