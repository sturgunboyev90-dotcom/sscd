<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foydali ilovalar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1f2c3a, #3a4f63);
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 80px 20px;
}

.header h1 {
    font-size: 50px;
    margin: 0;
}

.header p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
}

/* Cards */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.2);
}

.card h3 {
    margin-bottom: 10px;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #00c3ff;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

.card a:hover {
    background: #0099cc;
}
</style>

</head>
<body>

<div class="header">
    <h1>Foydali ilovalar</h1>
    <p>Eng kerakli va qiziqarli ilovalar ro‘yxati</p>
</div>

<div class="container">

    <div class="card">
        <h3>Telegram</h3>
        <p>Tezkor xabar almashish</p>
        <a href="#">Ochish</a>
    </div>

    <div class="card">
        <h3>YouTube</h3>
        <p>Video va kontent platformasi</p>
        <a href="#">Ochish</a>
    </div>

    <div class="card">
        <h3>Google Maps</h3>
        <p>Yo‘l va navigatsiya</p>
        <a href="#">Ochish</a>
    </div>

    <div class="card">
        <h3>Instagram</h3>
        <p>Rasm va video ulashish</p>
        <a href="#">Ochish</a>
    </div>

</div>

</body>
</html>
