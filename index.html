<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle, #1f2a32, #0f1419);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.logo {
    width: 120px;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.loader-text {
    margin-top: 15px;
    color: #e0f7fa;
    font-size: 22px;
}

/* HERO */
.hero {
    display: none;
    height: 100vh;
    background: linear-gradient(135deg, #0b1d2a, #02070d);
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero-content {
    color: white;
}

.hero h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.8;
    margin-bottom: 20px;
}

.btn {
    padding: 10px 20px;
    background: #2d6cdf;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* LOGIN */
.login {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #1f2a32;
    padding: 25px;
    border-radius: 10px;
    width: 260px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

.login-box button {
    width: 100%;
    padding: 10px;
    background: #2d6cdf;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="logo">
    <div class="loader-text">Xush kelibsiz</div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
    <div class="hero-content">
        <h1>Turg'unboyev Sardorbek Dilshodjon o'g'li</h1>
        <p>Forma — nafaqat vakolat, balki mas’uliyat</p>
        <button class="btn" onclick="openLogin()">Kirish</button>
    </div>
</div>

<!-- LOGIN -->
<div class="login" id="login">
    <div class="login-box">
        <h3 style="color:white;">Kirish</h3>
        <input type="text" id="loginInput" placeholder="Login">
        <input type="password" id="passwordInput" placeholder="Parol">
        <button onclick="enterSite()">Kirish</button>
    </div>
</div>

<script>
/* Loader → Hero */
setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("hero").style.display = "flex";
}, 1500);

/* Login ochish */
function openLogin() {
    document.getElementById("login").style.display = "flex";
}

/* Login tekshirish */
function enterSite() {
    let login = document.getElementById("loginInput").value;
    let password = document.getElementById("passwordInput").value;

    if (login === "sardorbek" && password === "0226") {
        alert("Kirish muvaffaqiyatli ✅");
        document.getElementById("login").style.display = "none";
    } else {
        alert("Login yoki parol noto‘g‘ri ❌");
    }
}
</script>

</body>
</html>
